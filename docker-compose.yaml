services:
  vercel-proxy:
    image: ghcr.io/edwinzzzs2/vercel-proxy:latest
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      PROXY_AUTH_TOKEN: "${PROXY_AUTH_TOKEN:?Set PROXY_AUTH_TOKEN in .env}"
      PROXY_AUTH_WHITELIST: "${PROXY_AUTH_WHITELIST:-}"
      PROXY_DOMAIN_WHITELIST: "${PROXY_DOMAIN_WHITELIST:-}"
      PROXY_LOG_PASSWORD: "${PROXY_LOG_PASSWORD:-}"
      PROXY_LOG_LIMIT: "${PROXY_LOG_LIMIT:-200}"
    restart: unless-stopped
    # To customize proxy behavior, mount a config file and pass --config.
    # volumes:
    #   - ./config.json:/config/config.json
    # command: ["--addr", ":3000", "--config", "/config/config.json"]
